---
# ============================================================================
# acme-domain-remove.yml
# ----------------------------------------------------------------------------
# Removes a single domain entry from acme.sh tracking + local deployed copies.
#
# ===========================================================================
# 0) Normalize & Validate (The Gold Standard)
# ===========================================================================
- name: Resolve the target domain for removal
  ansible.builtin.set_fact:
    _acme_domain: >-
      {{ 
        acme_domain | default(
          acme_domain_item.key if (acme_domain_item is mapping and acme_domain_item.key is defined) 
          else (acme_domain_item.domains[0] if (acme_domain_item is mapping and acme_domain_item.domains is defined) 
          else acme_domain_item), true
        ) 
      }}
  changed_when: false

- name: Check if acme.sh binary exists (Pre-Removal Check)
  ansible.builtin.stat:
    path: "{{ acme_sh_bin }}"
  register: _acme_bin_stat_local
  become: true
  become_user: "{{ acme_sh_become_user }}"

- name: Validate domain input
  ansible.builtin.assert:
    that: 
      - _acme_domain is defined
      - _acme_domain | length > 0
      - _acme_domain != 'none'
    fail_msg: "acme-domain-remove.yml could not resolve a domain from 'acme_domain' or 'acme_domain_item'."

# ===========================================================================
# 1) Identify variants (Only if binary exists)
# ===========================================================================
- name: Determine variants to remove from parsed inventory
  ansible.builtin.set_fact:
    _targets_to_remove: >-
      {%- set targets = [] -%}
      {%- for key, val in acme_cert_info.items() -%}
        {%- if key == _acme_domain -%}
          {%- set _ = targets.append({'domain': key, 'is_ecc': 'ec-' in (val.key_type | default('')) }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ targets }}
  when: _acme_bin_stat_local.stat.exists | bool
  changed_when: false

# ===========================================================================
# 2) Logical Removal via acme.sh
# ===========================================================================
- name: Remove domain from acme.sh tracking
  ansible.builtin.shell: >-
    {{ acme_sh_bin }} --remove -d {{ remove_target.domain }} {{ '--ecc' if remove_target.is_ecc else '' }}
  loop: "{{ _targets_to_remove | default([]) }}"
  loop_control:
    loop_var: remove_taget
    label: "{{ acme_domain_item.domain }} (ECC: {{ acme_domain_item.is_ecc }})"
  become: true
  become_user: "{{ acme_sh_become_user }}"
  when: 
    - _acme_bin_stat_local.stat.exists | bool
    - _targets_to_remove | default([]) | length > 0

# ===========================================================================
# 3) Physical Cleanup (Internal & Deployed)
# ===========================================================================
- name: Remove certificate directories
  ansible.builtin.file:
    path: "{{ remove_path.path }}"
    state: absent
  loop: >-
    {%- set paths = [] -%}
    {%- for t in (_targets_to_remove | default([])) -%}
      {# A) Internal directory #}
      {%- set suffix = '_ecc' if t.is_ecc else '' -%}
      {%- set _ = paths.append({'path': acme_sh_directory_resolved ~ '/' ~ t.domain ~ suffix}) -%}
      
      {# B) Deployed directory - Uses the resolved boolean from our defaults #}
      {%- set _should_remove = acme_sh_remove_deployed_certs | default(acme_sh_default_remove_deployed_certs, true) | bool -%}
      {%- if _should_remove -%}
        {%- set _ = paths.append({'path': acme_sh_copy_certs_to_path ~ '/' ~ t.domain}) -%}
      {%- endif -%}
    {%- endfor -%}
    {{ paths | unique(attribute='path') }}
  loop_control:
    loop_var: remove_path
    label: "{{ remove_path.path }}"
  become: true
  when: 
    - _acme_bin_stat_local.stat.exists | bool
    - _targets_to_remove | default([]) | length > 0

# ===========================================================================
# 4) Update Scoreboard
# ===========================================================================
- name: RECORD — Update removal status
  ansible.builtin.set_fact:
    acme_summary: >-
      {{
        acme_summary | combine({
          'removed': (
            acme_summary.removed | default([])
            if (
              _acme_domain in (
                (acme_summary.removed | default([]))
                | map(attribute='domain')
                | list
              )
            )
            else (
              (acme_summary.removed | default([]))
              + [{'domain': _acme_domain}]
            )
          )
        }, recursive=True)
      }}
  when: 
    - _acme_bin_stat_local.stat.exists | bool
    - _targets_to_remove | default([]) | length > 0
    - not _acme_uninstall | default(false) | bool

