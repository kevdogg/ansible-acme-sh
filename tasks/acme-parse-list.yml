- name: LIST — parse NEW format into acme_cert_info
  when: _acme_lines | length > 1
  vars:
    # Use the split() method to get headers reliably
    _header_tokens: "{{ _acme_lines[0].split() | map('regex_replace', '^\"(.*)\"$', '\\1') | list }}"
    
    _idx_domain:  "{{ _header_tokens.index('Main_Domain') }}"
    _idx_created: "{{ _header_tokens.index('Created') }}"
    _idx_renew:   "{{ _header_tokens.index('Renew') }}"

    # Use split() for every data row as well
    _rows_tokens: "{{ _acme_lines[1:] | map('split') | list }}"

    _kv_items: >-
      {%- set out = [] -%}
      {%- for row in _rows_tokens -%}
        {%- if row | length > _idx_renew -%}
          {# Clean the quotes from the specific tokens #}
          {%- set d = row[_idx_domain] | regex_replace('^\"(.*)\"$', '\\1') -%}
          {%- set created = row[_idx_created] | regex_replace('^\"(.*)\"$', '\\1') -%}
          {%- set renew = row[_idx_renew] | regex_replace('^\"(.*)\"$', '\\1') -%}
          
          {# Calculate days remaining #}
          {%- set renew_dt = renew | to_datetime('%Y-%m-%dT%H:%M:%SZ') -%}
          {%- set now_dt = ansible_facts['date_time']['iso8601'] | to_datetime -%}
          {%- set days = (renew_dt - now_dt).days -%}
          
          {%- set _ = out.append({'key': d, 'value': {'created': created, 'renew': renew, 'days_remaining': days}}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
  ansible.builtin.set_fact:
    acme_cert_info: "{{ _kv_items | items2dict(key_name='key', value_name='value') }}"
  tags: [list, plan]

- name: LIST — compute renewal urgency + emoji (optional)
  ansible.builtin.set_fact:
    acme_renew_status: >-
      {%- set out = {} -%}
      {%- for d, v in (acme_cert_info | default({})).items() -%}
      {%-   set days = (v.days_remaining | int) -%}
      {%-   set _ = out.update({
            d: (v | combine({
              'urgency': (
                'OK' if days > 30 else
                'SOON' if days > 10 else
                'URGENT'
              ),
              'emoji': (
                '✅' if days > 30 else
                '🟡' if days > 10 else
                '🔴'
              )
            }))
          }) -%}
      {%- endfor -%}
      {{ out }}
  when:
    - (acme_list_compute_status | default(true)) | bool
    - acme_cert_info is defined
  tags: [list, plan]
