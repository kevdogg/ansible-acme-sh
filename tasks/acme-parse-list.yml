---
# ============================================================================
# acme-parse-list.yml
# ----------------------------------------------------------------------------
# Purpose:
#   Minimal, side-effect-free parser for `acme.sh --list` (NEW format).
#   Produces:
#     - acme_cert_info: { "<domain>": {created, renew, days_remaining}, ... }
#     - acme_renew_status: { "<domain>": {urgency, emoji}, ... }   (optional)
#
# Inputs (optional vars):
#   acme_list_fail_on_error: bool (default true)
#   acme_list_compute_status: bool (default true)
# ============================================================================

- name: LIST — gather existing ACME cert info
  ansible.builtin.command: >
    {{ acme_sh_bin | default(acme_sh_default_bin, true) }} --list
  register: acme_list_result
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ acme_sh_become_user }}"
  tags: [list, plan]

- name: LIST — fail if acme.sh did not run
  ansible.builtin.fail:
    msg: |
      acme.sh --list failed to execute.
      bin={{ acme_sh_bin | default(acme_sh_default_bin, true) }}
      rc={{ acme_list_result.rc }}
      stderr={{ acme_list_result.stderr | default('') }}
  when:
    - (acme_list_fail_on_error | default(true)) | bool
    - acme_list_result.rc != 0
  tags: [list, plan]

- name: LIST — normalize acme.sh --list output
  ansible.builtin.set_fact:
    _acme_lines: "{{ acme_list_result.stdout_lines | map('trim') | reject('equalto', '') | list }}"
    #_acme_lines: "{{ acme_list_result.stdout_lines | reject('match', '^\\s*$') | list }}"
  tags: [list, plan]

- name: DEBUG — Inspect EVERY line and raw output
  ansible.builtin.debug:
    msg: 
      - "RAW STDOUT: |{{ acme_list_result.stdout }}|"
      - "NORMALIZED LINE COUNT: {{ _acme_lines | length }}"
      - "ALL LINES: {{ _acme_lines }}"
  when:
    - acme_list_result is defined
  tags: [list, plan, debug]

- name: LIST — set empty cert info when no certs exist
  ansible.builtin.set_fact:
    acme_cert_info: {}
    acme_renew_status: {}
  when: _acme_lines | length <= 1
  tags: [list, plan]

- name: LIST — Parse header tokens
  when: _acme_lines | length > 1
  ansible.builtin.set_fact:
    _header_tokens: "{{ _acme_lines[0].split() | map('regex_replace', '^\"(.*)\"$', '\\1') | list }}"
  tags: [list, plan]

#- name: Debug header line
#  ansible.builtin.debug:
#    msg: "Raw Header: '{{ _acme_lines[0] }}'"

- name: LIST — verify required columns exist (NEW format)
  when: _acme_lines | length > 1
  ansible.builtin.assert:
    that:
      - "'Main_Domain' in _header_tokens"
      - "'Created' in _header_tokens"
      - "'Renew' in _header_tokens"
    fail_msg: "acme.sh --list output missing required columns. Parsed header is: {{ _header_tokens }}"
  tags: [list, plan]

- name: LIST — parse acme.sh into acme_cert_info (Final Version)
  ansible.builtin.set_fact:
    acme_cert_info: >-
      {%- set certs = {} -%}
      {%- set now_epoch = now(utc=true).strftime('%s') | int -%}
      {%- for row_raw in (_acme_lines | default([]))[1:] -%}
        {%- set row = row_raw | regex_findall('\\S+') -%}
        {%- if row | length >= 3 -%}
          {%- set d = row[0] | regex_replace('^\"(.*)\"$', '\\1') -%}
          {%- set k = row[1] | regex_replace('^\"(.*)\"$', '\\1') -%}
          {%- set s_raw = row[2] | regex_replace('^\"(.*)\"$', '\\1') -%}
          {%- set s_list = [] if s_raw == 'no' else s_raw.split(',') -%}
          
          {%- set dates = [] -%}
          {%- for t in row -%}{%- if 'T' in t and 'Z' in t -%}{%- set _ = dates.append(t | regex_replace('^\"(.*)\"$', '\\1')) -%}{%- endif -%}{%- endfor -%}
          {%- set sorted_dates = dates | sort -%}

          {%- if sorted_dates | length >= 2 -%}
            {%- set c_str = sorted_dates[0] -%}
            {%- set r_str = sorted_dates[-1] -%}
            
            {# Convert both to epoch for math #}
            {%- set c_epoch = c_str | to_datetime('%Y-%m-%dT%H:%M:%SZ') | json_query('strftime("%s")') | default(0) | int -%}
            {# If json_query is cranky, we use the direct strftime method #}
            {%- set c_epoch = (c_str | to_datetime('%Y-%m-%dT%H:%M:%SZ')).strftime('%s') | int -%}
            {%- set r_epoch = (r_str | to_datetime('%Y-%m-%dT%H:%M:%SZ')).strftime('%s') | int -%}
            
            {# Math: Gap = Renew - Created. Expiry = Renew + Gap #}
            {%- set gap = r_epoch - c_epoch -%}
            {%- set expiry_epoch = r_epoch + gap -%}
            
            {# Convert back to string and date object for the "days left" calculation #}
            {%- set expiry_str = expiry_epoch | strftime('%Y-%m-%dT%H:%M:%SZ', utc=true) -%}

            {%- set _ = certs.update({ d: {
                'key_type': k,
                'sans': s_list,
                'created': c_str,
                'renew': r_str,
                'expiry': expiry_str,
                'days_to_expiry': ((expiry_epoch - now_epoch) / 86400) | int
              } }) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ certs }}

#- name: 🔍 THE TRUTH DEBUG
#  ansible.builtin.debug:
#    msg:
#      - "Full acme_cert_info: {{ acme_cert_info }}"
#      - "First Raw Line: {{ _acme_lines[1] | default('EMPTY') }}"
#      - "Tokens in First Line: {{ (_acme_lines[1] | default('')).split() }}"
#  tags: [always]

- name: LIST — compute renewal urgency + emoji (optional)
  ansible.builtin.set_fact:
    acme_renew_status: >-
      {%- set out = {} -%}
      {%- for d, v in (acme_cert_info | default({})).items() -%}
      {%-   set days = (v.days_remaining | int) -%}
      {%-   set _ = out.update({
            d: (v | combine({
              'urgency': (
                'OK' if days > 30 else
                'SOON' if days > 10 else
                'URGENT'
              ),
              'emoji': (
                '✅' if days > 30 else
                '🟡' if days > 10 else
                '🔴'
              )
            }))
          }) -%}
      {%- endfor -%}
      {{ out }}
  when:
    - (acme_list_compute_status | default(true)) | bool
    - acme_cert_info is defined
  tags: [list, plan]
