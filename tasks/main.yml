---
# ============================================================================
# main.yml — ACME.SH Role Entry Point
# ----------------------------------------------------------------------------
# Purpose:
#   Central task orchestrator for ACME certificate lifecycle management.
#   This role automates installation, issuance, renewal, and teardown of
#   acme.sh-managed certificates across multiple domains.
#
# Includes:
#   • acme-install-acme-sh.yml       → Installs acme.sh and systemd setup
#   • acme-domain-workflow.yml       → Handles per-domain issue/renew/deploy
#   • acme-domain-remove.yml         → Handles selective domain removal
#   • acme-remove-all.yml            → Performs full uninstallation
#   • acme-plan.yml / summary files  → Preflight and postflight reports
#   • test-filters.yml               → Developer-only plugin validation
#
# Tag model:
#   - plan ............: Build & display preflight plan
#   - workflow ........: Issue / renew / deploy certificates
#   - install_acme.sh .: Install acme.sh + setup systemd timer/service
#   - remove ..........: Remove selected domain(s)
#   - remove_all ......: Full uninstall and cleanup
#   - summary .........: Compact post-execution report
#   - debug ...........: Diagnostic output (skippable with --skip-tags debug)
#   - test-filters ....: Developer-only plugin test suite
#
# Version: 2025.11.09
# Maintainer: KevDog
# Tags: [acme, letsencrypt, workflow, automation, lifecycle, debug]
# ============================================================================

# Normalize uninstall boolean once (so you don’t repeat default() chains)
- name: Normalize uninstall toggle
  ansible.builtin.set_fact:
    _acme_uninstall: "{{ (acme_sh_uninstall | default(acme_sh_default_uninstall, true)) | bool }}"
  tags: [always]

########################
# Ensure acme is installed
########################
# IMPORTANT:
# - Do NOT run this during full uninstall
# - Do NOT tag it with "remove" (domain-remove still needs acme.sh present, but you can install if missing anyway)
- name: Install acme.sh if not installed
  ansible.builtin.include_tasks:
    file: acme-install-acme-sh.yml
    apply:
      tags: [install, workflow, plan]
  when: not _acme_uninstall
  tags: [install, workflow, plan]

########################
# PreTasks
########################

- name: Debug to show all ACME domain variables
  ansible.builtin.debug:
    msg: "{{ item | default('No domain object') }}"
  loop: "{{ acme_sh_domains | default([]) }}"
  become: true
  become_user: "{{ acme_sh_become_user }}"
  tags: [debug]

- name: Resolve acme.sh remote paths
  ansible.builtin.include_tasks:
    file: acme-resolve-paths.yml
  tags: [always]

- name: Initialize ACME summary scoreboard
  ansible.builtin.set_fact:
    acme_summary:
      installed: []
      renewed: []
      skipped: []
      removed: []
      failed: []
      warnings: []
      uninstalled: false
  tags: [always]

# Gather existing certificate data prior to processing
- name: BASELINE — Gather existing certificate dates
  ansible.builtin.include_tasks:
    file: acme-parse-list.yml
    apply:
      tags: [always]
  tags: [always, list]

############################
# Full Uninstall Phase
############################

- name: 🧹 Full ACME teardown
  block:
    - name: Execute removal of all components
      ansible.builtin.include_tasks: 
        file: acme-remove-all.yml
        apply:
          tags: [remove_all, teardown]

    # We call the summary display here because meta: end_host 
    - name: Display Teardown Summary
      ansible.builtin.include_tasks: 
        file: acme-summary-compact.yml
        apply:
          tags: [summary]
      tags: [always, summary]

    - name: End role execution for this host
      ansible.builtin.meta: end_host

  when: _acme_uninstall | default(false) | bool
  tags: [remove_all, teardown]

########################
# Plan Phase
########################
# If user runs --tags plan, this runs (and only then).
- name: Generate ACME preflight plan
  ansible.builtin.include_tasks:
    file: acme-plan.yml
    apply:
      tags: [plan]
  when:
    - not _acme_uninstall
    - "'plan' in ansible_run_tags"
  tags: [plan]

########################
# Issue / Renew Phase
########################

- name: Obtain and install/renew acme.sh certificates
  ansible.builtin.include_tasks:
    file: acme-domain-workflow.yml
    apply:
      tags: [workflow]
  loop: "{{ acme_sh_domains | default([]) }}"
  loop_control:
    label: "{{ item.domains[0] | default('UNKNOWN') }}"
  when:
    - not _acme_uninstall
    - acme_sh_domains is defined
    - acme_sh_domains | length > 0
    - item.domains is defined
    - item.domains | length > 0
    - not (item.remove | default(false) | bool)
  tags: [workflow]

############################
# Remove Certificate Phase
############################

############################
# Remove Certificate Phase
############################

# 1. Catch domains that are already gone so they show up in the summary
- name: RECORD — Mark already absent domains
  ansible.builtin.set_fact:
    acme_summary_absent: "{{ acme_summary_absent | default([]) + [ {'domain': item.domains[0]} ] }}"
  loop: "{{ acme_sh_domains | default([]) }}"
  loop_control:
    label: "{{ item.domains[0] }}"
  when:
    - not _acme_uninstall
    - item.remove | default(false) | bool
    - item.domains[0] not in acme_cert_info  # It's NOT in the acme.sh --list
  tags: [remove]

# 2. Only run the removal workflow for domains that actually exist
- name: Process ACME domain removals
  ansible.builtin.include_tasks: 
    file: acme-domain-remove.yml
    apply:
      tags: [remove]
  loop: "{{ acme_sh_domains | default([]) }}"
  loop_control:
    loop_var: acme_domain_item
    label: "{{ acme_domain_item.domains[0] }}"
  vars:
    # Explicitly pass the domain name so the child file doesn't have to guess
    acme_domain: "{{ item.domains[0] }}" 
  when:
    - not _acme_uninstall
    - acme_domain_item.domains is defined
    - acme_domain_item.domains | length > 0
    - acme_domain_item.remove | default(false) | bool
    - acme_domain_item.domains[0] in acme_cert_info
  tags:
    - remove

- name: REFRESH — Gather certificate inventory after removals
  ansible.builtin.include_tasks:
    file: acme-parse-list.yml
    apply:
      tags: [always]
  vars:
    acme_list_fail_on_error: false
    acme_list_compute_status: true
  when:
    - not _acme_uninstall
  tags: [remove, summary, always]

############################
# Developer / Diagnostic
############################

# Removed — dev only
# include_tasks: test-filters.yml

############################
# Final Summary
############################

- name: Include final summary
  ansible.builtin.include_tasks:
    file: acme-summary-compact.yml
    apply:
      tags: [summary]
  when:
    - acme_summary is defined
    - ansible_run_tags | difference(['plan', 'debug']) | length > 0
  tags: [summary]
