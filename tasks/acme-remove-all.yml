---
# ============================================================================
# acme-remove-all.yml
# ----------------------------------------------------------------------------
# Full ACME teardown:
#   - stop/disable systemd timer/service and remove unit files
#   - remove all certs tracked by acme.sh (NEW format --list)
#   - remove internal cert dirs under ~/.acme.sh (RSA/ECC)
#   - optionally remove deployed copies under /etc/ssl/letsencrypt/<domain>
#   - uninstall acme.sh and remove ~/.acme.sh and git clone dir
#
# Behavior toggles:
#   - acme_sh_remove_all_variants (default: acme_sh_default_remove_all_variants)
#       true  => attempt removing BOTH RSA + ECC for each domain (best effort)
#       false => remove only the variant indicated by KeyLength in --list
#
#   - acme_sh_remove_deployed_certs_on_uninstall
#       (default: acme_sh_default_remove_deployed_certs_on_uninstall)
#       true  => also delete deployed dirs under acme_sh_copy_certs_to_path/<domain>
#       false => leave deployed dirs alone
# ============================================================================
# ===========================================================================
# 1) PREPARATION & DISCOVERY
# ===========================================================================
# ======================================================================
# ACME.SH PATH RESOLUTION (change ~/.acme.sh to {{ become_user }}_home_dir/.acme.sh)
# ======================================================================
- name: Resolve acme.sh paths
  ansible.builtin.include_tasks:
    file: acme-resolve-paths.yml
    apply:
      tags: [always]
  tags: [always]

- name: Check if acme.sh exists before proceeding with teardown
  ansible.builtin.stat:
    path: "{{ acme_sh_bin_resolved }}"
  register: _acme_bin_stat
  become: true
  become_user: "{{ acme_sh_become_user }}"

- name: Gather current certificate inventory for teardown
  ansible.builtin.include_tasks: acme-parse-list.yml
  vars:
    acme_sh_bin: "{{ acme_sh_bin_resolved }}"
  when: _acme_bin_stat.stat.exists | bool

# ===========================================================================
# 2) LOGICAL REMOVAL (Domain by Domain)
# ===========================================================================
- name: Execute removal workflow for all discovered certificates
  ansible.builtin.include_tasks:
    file: acme-domain-remove.yml
  loop: "{{ acme_cert_info | dict2items }}"
  loop_control:
    loop_var: acme_domain_item
    label: "Removing: {{ teardown_cert.key }}"
  vars:
    acme_sh_bin: "{{ acme_sh_bin_resolved }}"
    acme_domain: "{{ acme_domain_item.key }}"
    # We set this to true so worker doesn't update the scoreboard 100 times
    _acme_uninstall: true
  when: 
    - _acme_bin_stat.stat.exists | bool
    - acme_cert_info is defined
    - acme_cert_info | length > 0

# ===========================================================================
# 3) DECOMMISSION GLOBAL AUTOMATION (Systemd)
# ===========================================================================
- name: Stop/disable global acme timer & service
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: false
    state: stopped
    daemon_reload: false
  loop:
    - "{{ acme_sh_systemd_timer_name | default(acme_sh_default_systemd_timer_name, true) }}"
    - "{{ acme_sh_systemd_service_name | default(acme_sh_default_systemd_service_name, true) }}"
  failed_when: false
  become: true

- name: Remove systemd unit files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ acme_sh_systemd_timer_path | default(acme_sh_default_systemd_timer_path, true) }}"
    - "{{ acme_sh_systemd_service_path | default(acme_sh_default_systemd_service_path, true) }}"
  failed_when: false
  become: true

- name: Systemd daemon reload
  ansible.builtin.systemd_service:
    daemon_reload: true
  changed_when: false
  become: true

# ===========================================================================
# 4) FINAL UNINSTALL & PHYSICAL CLEANUP
# ===========================================================================
- name: Uninstall acme.sh binary (removes aliases and shell integration)
  ansible.builtin.shell: "{{ acme_sh_bin_resolved }} --uninstall"
  args:
    chdir: "{{ acme_sh_directory_resolved }}"
  failed_when: false
  changed_when: true
  become: true
  become_user: "{{ acme_sh_become_user }}"
  when: _acme_bin_stat.stat.exists | bool

- name: Remove management and deployment directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: >-
    {%- set paths = [] -%}
    {# 1. Internal directory #}
    {%- set _ = paths.append(acme_sh_directory_resolved) -%}
    
    {# 2. Deployment root (if toggle is set) #}
    {%- set _remove_deployed = acme_sh_remove_deployed_certs_on_uninstall | default(acme_sh_default_remove_deployed_certs_on_uninstall, true) | bool -%}
    {%- if _remove_deployed and acme_sh_copy_certs_to_path is defined -%}
      {%- set _ = paths.append(acme_sh_copy_certs_to_path) -%}
    {%- endif -%}
    {{ paths | unique }}
  become: true
  when: >
    _acme_bin_stat.stat.exists | bool
    or (acme_sh_remove_deployed_certs_on_uninstall | default(acme_sh_default_remove_deployed_certs_on_uninstall, true) | bool)

- name: Remove acme.sh git repository clone (best effort)
  ansible.builtin.file:
    path: "{{ acme_sh_git_clone_dest | default(acme_sh_default_git_clone_dest, true) }}"
    state: absent
  become: true
  become_user: "{{ acme_sh_become_user }}"
  failed_when: false

# ===========================================================================
# 5) VERIFICATION & SCOREBOARD
# ===========================================================================
- name: Confirm acme.sh binary removed
  ansible.builtin.stat:
    path: "{{ acme_sh_bin_resolved }}"
  register: acme_bin_check
  changed_when: false
  become: true
  become_user: "{{ acme_sh_become_user }}"

- name: Record uninstallation in scoreboard
  ansible.builtin.set_fact:
    acme_summary: >-
      {{
        acme_summary | combine({
          'uninstalled': true,
          'binary_removed': (not (acme_bin_check.stat.exists | default(false))),
          'removed': (
            (acme_cert_info | default({}) | dict2items)
            | map(attribute='key')
            | map('community.general.dict_kv', 'domain')
            | list
          ),
          'details': 'Full system teardown completed',
          'timestamp': ansible_date_time.iso8601
        }, recursive=True)
      }}
    acme_summary_absent: []

- name: Debug confirmation result
  ansible.builtin.debug:
    msg: >-
      {{
        '✅ acme.sh successfully removed.'
        if not (acme_bin_check.stat.exists | default(false))
        else '⚠️ acme.sh binary still present at ' ~ acme_sh_bin
      }}
  tags: [debug]
