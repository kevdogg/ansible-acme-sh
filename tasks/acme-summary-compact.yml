---
# ============================================================================
# acme-summary-compact.yml
# ----------------------------------------------------------------------------
# Purpose:
#   Produces the final compact report summarizing actual ACME operations per host.
#   Displays the results of certificate installation, renewal, removal, and failure.
#
# Scope:
#   Runs once after all domain tasks complete (post-loop summary).
#   Compares final scoreboard data to the preflight plan when available.
#
# Notes:
#   - Shows domain-by-domain status (✅ installed / ♻️ renewed / ⚠️ failed / 🗑️ removed).
#   - Includes optional plan delta comparison when acme_plan_summary is defined.
#   - Warnings from dual-cert detection are merged into the output.
#   - Used as the final report task in tasks/main.yml.
#
# Version: 2025.11.07 / compatible with acme.sh ≥ 3.0.8
# Maintainer: KevDog
# Tags: [acme, letsencrypt, summary, postflight, report]
# ============================================================================


# Compact end-of-role summary with optional plan delta comparison
# Requires:
#   - acme_summary (always initialized at play start)
#   - acme_plan_summary (from acme-plan.yml)
#   - acme_sh_show_plan_deltas (defaults to true in defaults/main.yml)

- name: SUMMARY — compact end-of-role overview (iTerm2 Optimized)
  vars:
    # --- ANSI Styling Codes for iTerm2 ---
    b: "\e[1m"          # Bold
    bi: "\e[1;3m"       # Bold Italic
    reset: "\e[0m"      # Reset Formatting

    # Central Time is UTC-5 (CDT) or UTC-6 (CST)
    # Most modern Python/Ansible setups can handle 'America/Chicago' directly
    local_tz: "America/Chicago"

    # --- Existing Playbook Action Vars ---
    installed: "{{ acme_summary.installed | default([]) }}"
    renewed:   "{{ acme_summary.renewed   | default([]) }}"
    removed:   "{{ acme_summary.removed   | default([]) }}"
    # 'skipped' now ONLY contains actual skipped tasks (like missing binaries)
    skipped:   "{{ acme_summary.skipped   | default([]) }}"
    # 'absent' is its own clean list from our removal check
    absent:    "{{ acme_summary_absent    | default([]) }}"
    failed:    "{{ acme_summary.failed    | default([]) }}"
    warnings:  "{{ acme_summary.warnings  | default([]) }}" 
    
    # --- Audit & Inventory Vars ---
    managed_list: "{{ acme_sh_domains | map(attribute='domains') | flatten | list }}"
    server_list: "{{ acme_cert_info.keys() | list }}"
    orphaned: "{{ server_list | difference(managed_list) }}"
    
    # Dynamic time fallback
    report_time: >-
      {{ ansible_facts['date_time']['iso8601'] 
         if (ansible_facts['date_time'] is defined and ansible_facts['date_time']['iso8601'] is defined) 
         else now(utc=true).strftime('%Y-%m-%dT%H:%M:%SZ') }}

  ansible.builtin.debug:
    msg: |
      {{ b }}======================================================================
      🔹 ACME.SH SUMMARY — {{ bi }}{{ inventory_hostname | upper }}{{ reset }}{{ b }}
      ====================================================================== {{ reset }}

      {{ b }}✅ Installed:{{ reset }} {{ installed | length }}
      {{ b }}🔁 Renewed:{{ reset }}   {{ renewed | length }}
      {{ b }}🗑️ Removed:{{ reset }}   {{ removed | length }}
      {{ b }}⏭️ Skipped:{{ reset }}   {{ skipped | length }}
      {{ b }}🧾 Absent:{{ reset }}    {{ absent | length }}
      {{ b }}❌ Failed:{{ reset }}    {{ failed | length }}
      {{ b }}⚠️  Warnings:{{ reset }}  {{ warnings | length }}
      {{ b }}🚫 Uninstalled:{{ reset }} {{ 'Yes' if (uninstalled is defined and uninstalled | length > 0) else 'No' }}

      {% if installed %}
      {{ b }}✅ Installed{{ reset }}
      {% for e in installed %}
        - {{ e.domain }}
      {% endfor %}
      {%- endif %}
      {% if renewed %}
      {{ b }}🔁 Renewed{{ reset }}
      {% for e in renewed %}
        - {{ e.domain }}
      {% endfor %}
      {%- endif %}
      {% if removed %}
      {{ b }}🗑️ Removed{{ reset }}
      {% for e in removed %}
        - {{ e.domain }}
      {% endfor %}
      {%- endif %}
      {% if absent %}
      {{ b }}🧾 Absent (Already Removed){{ reset }}
      {% for e in absent %}
        - {{ e.domain }}
      {% endfor %}
      {%- endif %}
      {% if skipped %}
      {{ b }}⏭️ Skipped{{ reset }}
      {% for e in skipped %}
        - {{ e.domain }}{{ (' → ' ~ e.message) if e.message is defined else '' }}
      {% endfor %}
      {%- endif %}
      {% if failed %}
      {{ b }}❌ Failed{{ reset }}
      {% for e in failed %}
        - {{ e.domain }}
      {% endfor %}
      {%- endif %}
      {% if warnings %}
      {{ b }}⚠️ Warnings{{ reset }}
      {% for w in warnings %}
        - {{ w.domain }} → {{ w.message }}
      {% endfor %}
      {%- endif %}
      {% if acme_summary.filter_tests is defined %}
      {{ b }}🧪 Filter Plugin Tests{{ reset }}
        → Result: {{ '✅ PASSED' if acme_summary.filter_tests.status == 'passed' else '❌ FAILED' }}
      {%- endif %}

      {{ b }}================================
      🛡️ INFRASTRUCTURE AUDIT
      ================================{{ reset }}
      ✅ Managed & Active on Server: {{ (server_list | intersect(managed_list)) | length }}
      
      {% if orphaned | length > 0 %}
      {{ b }}⚠️ ORPHANED{{ reset }} (In acme.sh, NOT in Playbook):
      {% for d in orphaned %}
        - {{ d }} ({{ acme_cert_info[d].days_remaining }} days left)
      {% endfor %}
      {% else %}
      ✅ No orphaned certificates found.
      {% endif %}

      {{ b }}================================
      📜 FULL CERTIFICATE INVENTORY
      ================================{{ reset }}
      {% for domain, info in acme_cert_info.items() %}
      {{ b }}DOMAIN:{{ reset }} {{ domain }} [{{ info.key_type }}]
      - CA: {{ info.ca }}
      - SANS:    {{ info.sans | join(', ') if info.sans else 'None' }}
      - Created: {{ (info.created | to_datetime('%Y-%m-%dT%H:%M:%SZ')).astimezone().strftime('%Y-%m-%d %H:%M:%S') }}
      - Expiry:  {{ (info.expiry  | to_datetime('%Y-%m-%dT%H:%M:%SZ')).astimezone().strftime('%Y-%m-%d %H:%M:%S') }} ({{ info.days_remaining }} days left)
      - Renew:   {{ (info.renew   | to_datetime('%Y-%m-%dT%H:%M:%SZ')).astimezone().strftime('%Y-%m-%d %H:%M:%S') }}
      --------------------------------
      {% endfor %}

      📅 Summary generated at: {{ now(utc=false).strftime('%Y-%m-%d %H:%M:%S') }} Central Time
  when: not (acme_summary.uninstalled | default(false) | bool)
  tags: [always, summary]

- name: "📊 ACME.SH TEARDOWN SUMMARY"
  vars:
    b: "\e[1m"
    reset: "\e[0m"
  ansible.builtin.debug:
    msg: |
      {{ b }}======================================================================
      🛑 FULL UNINSTALL COMPLETED — {{ inventory_hostname | upper }}
      ====================================================================== {{ reset }}
      Status:         {{ '✅ SUCCESS' if acme_summary.binary_removed else '⚠️ BINARY STILL PRESENT' }}
      Timestamp:      {{ acme_summary.timestamp }}
      
      {{ b }}🗑️ PURGED CERTIFICATES:{{ reset }}
      {% for e in acme_summary.removed %}
      - {{ e.domain }}
      {% endfor %}
      
      {{ b }}COMPONENTS REMOVED:{{ reset }}
      - acme.sh binary and aliases
      - Systemd Timer and Service units
      - Git Source (if present)
      - Deployment directories (if configured)
      ======================================================================
  when: acme_summary.uninstalled | default(false) | bool
  tags: [always summary]

